version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: video-process-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      # Mount GCP service account key for local dev
      - ./service_account.json:/app/service_account.json:ro
      # Hot-reload app code in development
      - ./app:/app/app
      # Persistent temp directory
      - video_tmp:/tmp/video_process
    environment:
      - APP_ENV=development
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  video_tmp:
